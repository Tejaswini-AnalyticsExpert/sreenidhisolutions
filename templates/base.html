<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}Sreenidhi Solutions | Solar Panels, Inverters & Batteries{% endblock %}</title>

<meta name="description" content="Sreenidhi Solutions provides professional solar panel installation, inverters, UPS systems, batteries, and power backup solutions for homes and businesses.">

<meta name="keywords" content="Sreenidhi Solutions, Solar Panels, Solar Installation, Inverters, Batteries, UPS, Power Backup">

<meta name="author" content="Sreenidhi Solutions">

<!-- CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<!-- Favicon -->
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/ss-icon.png') }}">

<!-- Open Graph -->
<meta property="og:title" content="Sreenidhi Solutions">
<meta property="og:description" content="Professional solar, inverter, UPS, and battery solutions.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sreenidhisolutions.pythonanywhere.com/">
<meta property="og:image" content="https://sreenidhisolutions.pythonanywhere.com/static/images/ss-icon.png">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Sreenidhi Solutions">
<meta name="twitter:description" content="Professional solar, inverter, UPS, and battery solutions.">
<meta name="twitter:image" content="https://sreenidhisolutions.pythonanywhere.com/static/images/ss-icon.png">

<!-- Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Sreenidhi Solutions",
  "url": "https://sreenidhisolutions.pythonanywhere.com/",
  "logo": "https://sreenidhisolutions.pythonanywhere.com/static/images/ss-icon.png"
}
</script>   
      

</head>
<body>

<nav>
    <div class="logo">

    <a href="/" class="logo-wrapper">

        <img src="{{ url_for('static', filename='images/ss-icon.png') }}"
             alt="Sreenidhi Solutions">

        <div class="brand-text">

            <h1>
                <span class="blue">SREE</span><span class="green">NIDHI</span>
            </h1>

            <div class="solutions-line">

                <span class="line"></span>

                <h2>SOLUTIONS</h2>

                <span class="line"></span>

            </div>

            <p>POWERING HOMES. POWERING TOMORROWS.</p>

        </div>

        </a>


    </div>

        <button class="hamburger" id="hamburger">
            ☰
        </button>

<ul class="nav-links" id="nav-links">

        
            <li><a href="/">Home</a></li>
            <li><a href="/#about">About</a></li>
            <li><a href="/#services">Services</a></li>
            <li><a href="/#process">Process</a></li>
            <li><a href="/#pricing">Pricing</a></li>
            <li><a href="/contact">Contact</a></li>

            <li class="mobile-btn">
                <a href="/contact" class="quote-btn">
                    Get a Free Consultation
                </a>
            </li>
        </ul>

    
</nav>

{% block content %}
{% endblock %}

<footer class="footer">
    <div class="footer-bottom">
        &copy; 2026 Sreenidhi Solutions. All Rights Reserved.
    </div>
</footer>

<a href="https://wa.me/919866255666" class="whatsapp-float" target="_blank">💬</a>

<button id="topBtn" onclick="topFunction()">↑</button>

<script>
window.onscroll = function () {
    const btn = document.getElementById("topBtn");
    btn.style.display = document.documentElement.scrollTop > 300 ? "block" : "none";
};

function topFunction() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
}
</script>


<script>

function closeSuccessModal(){

    document.getElementById("successModal").style.display="none";

}

window.onload=function(){

    const params=new URLSearchParams(window.location.search);

    if(params.get("success")=="1"){

        document.getElementById("successModal").style.display="flex";

    }

}

</script>


<script>

        const hamburger = document.getElementById("hamburger");
        const navLinks = document.getElementById("nav-links");

        hamburger.addEventListener("click", function () {

            navLinks.classList.toggle("active");

            hamburger.innerHTML =
                navLinks.classList.contains("active") ? "✕" : "☰";

        });

        document.querySelectorAll("#nav-links a").forEach(link => {

            link.addEventListener("click", function () {

                navLinks.classList.remove("active");

                hamburger.innerHTML = "☰";

            });

        });

</script>


</body>
</html>
